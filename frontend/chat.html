<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | HostelMate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .chat-layout { height: calc(100vh - 70px); background: #f8fafc; }
        .chat-container { max-width: 900px; margin: 0 auto; height: 100%; display: grid; grid-template-columns: 280px 1fr; background: white; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        
        .chat-sidebar { border-right: 1px solid var(--border); overflow-y: auto; background: #fcfcfc; }
        .sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--border); font-weight: 700; color: var(--text-dark); }
        
        .chat-main { display: flex; flex-direction: column; height: 100%; }
        .chat-header { padding: 1rem 2rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        
        .chat-body { flex: 1; padding: 2rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; background: #fcfcfc; }
        .msg { max-width: 75%; padding: 0.8rem 1.2rem; border-radius: 12px; font-size: 0.95rem; line-height: 1.5; }
        .msg-sent { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .msg-received { align-self: flex-start; background: #f1f5f9; color: var(--text-dark); border-bottom-left-radius: 2px; }
        .msg-info { font-size: 0.7rem; opacity: 0.7; margin-top: 4px; display: flex; justify-content: space-between; }

        .chat-footer { padding: 1.5rem 2rem; border-top: 1px solid var(--border); }
        .input-group { display: flex; gap: 0.75rem; background: #f1f5f9; padding: 0.5rem; border-radius: 99px; }
        .chat-input { flex: 1; border: none; background: transparent; padding: 0.5rem 1rem; font-size: 0.95rem; }
        .chat-input:focus { box-shadow: none; }
        .send-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-content">
            <a href="index.html" class="nav-brand"><i data-lucide="school"></i> HostelMate</a>
            <ul class="nav-links" id="nav-links"></ul>
        </div>
    </nav>

    <div class="chat-layout">
        <div class="chat-container">
            <aside class="chat-sidebar">
                <div class="sidebar-header">Recent Inquiries</div>
                <div id="contactList">
                    <!-- Contacts will appear here -->
                    <div style="padding:2rem; text-align:center; color:var(--text-light); font-size:0.9rem;">
                        Select a contact to start chatting.
                    </div>
                </div>
            </aside>

            <main class="chat-main" id="chatMain" style="display:none;">
                <header class="chat-header">
                    <div>
                        <h3 id="currentChatUser" style="margin:0; font-size:1.1rem;">User</h3>
                        <p id="currentHostel" style="margin:0; font-size:0.8rem; color:var(--text-light);">Hostel Inquiry</p>
                    </div>
                </header>

                <div class="chat-body" id="chatMessages">
                    <!-- Messages here -->
                </div>

                <form class="chat-footer" id="chatForm">
                    <div class="input-group">
                        <input type="text" id="msgInput" class="chat-input" placeholder="Type your message..." required autocomplete="off">
                        <button type="submit" class="send-btn">
                            <i data-lucide="send" style="width:18px"></i>
                        </button>
                    </div>
                </form>
            </main>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
