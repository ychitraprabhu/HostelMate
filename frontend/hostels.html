<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Hostels | HostelMate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .filter-section {
            padding: 3rem 0;
            background: white;
            border-bottom: 1px solid var(--border);
        }
        .filter-bar {
            display: flex;
            gap: 1rem;
            align-items: flex-end;
            background: white;
        }
        .filter-item { flex: 1; }
        
        .hostels-section { padding: 4rem 0; }
        .hostels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }
        
        .hostel-card .img-wrapper {
            position: relative;
            height: 200px;
        }
        .hostel-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .type-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
        }
        .hostel-content { padding: 1.5rem; }
        .hostel-name { font-size: 1.25rem; font-weight: 700; color: var(--text-dark); margin-bottom: 0.5rem; }
        .hostel-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        .hostel-meta span { display: flex; align-items: center; gap: 0.25rem; }
        .price-tag {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1.5rem;
        }
        .price-sub { font-size: 0.85rem; color: var(--text-light); font-weight: 400; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-content">
            <a href="index.html" class="nav-brand"><i data-lucide="school"></i> HostelMate</a>
            <ul class="nav-links" id="nav-links"></ul>
        </div>
    </nav>

    <div class="filter-section">
        <div class="container text-center">
            <h1 class="mb-4">Explore Hostels</h1>
            <div class="filter-bar">
                <div class="filter-item">
                    <label class="form-label text-left" style="display:block; text-align:left;">Location</label>
                    <select id="locationFilter">
                        <option value="">All Areas</option>
                        <option value="Medchal">Medchal</option>
                        <option value="Kandlakoya">Kandlakoya</option>
                        <option value="Kompally">Kompally</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label class="form-label" style="display:block; text-align:left;">Hostel Type</label>
                    <select id="typeFilter">
                        <option value="">All Types</option>
                        <option value="Boys">Boys Only</option>
                        <option value="Girls">Girls Only</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label class="form-label text-left" style="display:block; text-align:left;">Price Range</label>
                    <select id="priceFilter">
                        <option value="">Any Price</option>
                        <option value="0-6000">Under ₹6,000</option>
                        <option value="6000-8000">₹6,000 - ₹8,000</option>
                        <option value="8000-100000">Above ₹8,000</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label class="form-label" style="display:block; text-align:left;">Sharing Type</label>
                    <select id="roomTypeFilter">
                        <option value="">Any Sharing</option>
                        <option value="1">Single Room</option>
                        <option value="2">2 Sharing</option>
                        <option value="3">3 Sharing</option>
                        <option value="4">4 Sharing</option>
                    </select>
                </div>
                <button id="applyFiltersBtn" class="btn btn-primary" style="height: 48px; min-width: 120px;">
                    <i data-lucide="search"></i> Find
                </button>
            </div>
        </div>
    </div>

    <main class="hostels-section">
        <div class="container">
            <div id="hostelsGrid" class="hostels-grid">
                <!-- Data injected by JS -->
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p class="footer-text">© 2025 HostelMate. A premium experience for students.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/hostels.js"></script>
</body>
</html>
