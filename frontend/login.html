<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HostelMate Simple</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/index.html" class="brand">Hostel<span>Mate</span></a>
            <ul class="nav-links" id="authLinks"></ul>
        </div>
    </nav>

    <div class="container auth-container">
        <div class="card">
            <h2 class="text-center">Welcome Back</h2>
            <div id="errorMsg" class="alert alert-error hidden"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%">Login</button>
            </form>
            <p class="text-center mt-2" style="font-size: 0.9rem;">
                Don't have an account? <a href="/register.html">Register here</a>
            </p>
        </div>
    </div>

    <script src="/js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const data = await fetchAPI('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ email, password })
                });

                setAuthData(data);
                if (data.role === 'admin') {
                    window.location.href = '/admin.html';
                } else {
                    window.location.href = '/hostels.html';
                }
            } catch (error) {
                showError(error.message);
            }
        });
    </script>
</body>
</html>
